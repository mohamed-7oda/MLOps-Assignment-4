name: ML Model CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linter Check
        run: |
          pip install flake8
          flake8 . || true


      - name: Model Dry Test
        run: |
          python -c "import tensorflow; print('Model environment ready!')"

      - name: Upload README Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md
